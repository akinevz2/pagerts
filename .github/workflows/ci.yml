name: CI/CD Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Manual trigger for incident response and quick validation.
  workflow_dispatch:
  schedule:
    # Run security checks daily at 00:00 UTC
    - cron: '0 0 * * *'

# Cancel stale runs on the same ref to reduce queue noise and spend.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt actions runtime into Node 24 now to avoid Node 20 deprecation cliff.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Blocking security gate: fail CI when moderate+ vulnerabilities are detected.
      - name: Check for dependency vulnerabilities
        run: npm run security:audit

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version
          npm config get cache

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with security plugin
        run: npm run lint

      - name: Check code formatting
        id: prettier_check
        run: npm run format:check
        continue-on-error: true

      - name: Explain Prettier failures
        if: steps.prettier_check.outcome == 'failure'
        run: |
          echo "Prettier found formatting issues in the files below:"
          npx prettier --list-different "**/*.{ts,js,mjs,cjs,json,yml,yaml,md}"

          while IFS= read -r file; do
            if [[ -z "$file" ]]; then
              continue
            fi

            echo "::group::Prettier diff: $file"
            npx prettier "$file" | diff -u "$file" - || true
            echo "::endgroup::"
          done < <(npx prettier --list-different "**/*.{ts,js,mjs,cjs,json,yml,yaml,md}")

      - name: Fail if formatting issues were found
        if: steps.prettier_check.outcome == 'failure'
        run: |
          echo "Formatting check failed. Run: npm run format"
          exit 1

      - name: TypeScript type check
        run: npm run type-check

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version
          npx tsc --version

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        # Keep matrix aligned with package engines (>=20).
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage reports
        # Restrict uploads to trusted push events to avoid fork PR token/OIDC issues.
        if: matrix.node-version == '20.x' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version
          npx jest --version

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security-audit, lint-and-format, test]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: bin/
          retention-days: 7

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version
